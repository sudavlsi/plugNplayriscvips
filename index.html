<!DOCTYPE html>
<html>
<head>
  <title>Dropdown Example</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('background_images/file_000000004a7871fa963e445506e6f059.png') no-repeat center center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .overlay {
      background: rgba(0, 0, 0, 0.6);
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
    }

    label {
      font-size: 20px;
      color: #00ffff;
      display: block;
      margin-bottom: 10px;
    }

    select {
      padding: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      margin-bottom: 20px;
      background-color: #111;
      color: #00ffff;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      background-color: #00ffff;
      color: #000;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background-color: #00cccc;
    }
  </style>

  <script>
    function runSelection() {
      var CORE = document.getElementById("CORE").value;
      alert("You selected: " + CORE);
    }
  </script>
</head>
<body>

  <div class="overlay">
    <label for="CORE">Choose a Core:</label>
    <select id="CORE" name="CORE">
      <option value="RV32I">RV32I</option>
      <option value="RV64I">RV64I</option>
    </select>
    <br>
    <label for="DATA_WIDTH">Choose DATA_WIDTH:</label>
    <select id="DATA_WIDTH" name="DATA_WIDTH">
      <option value="32">32</option>
      <option value="64">64</option>
    </select>
    <br>
    <button onclick="runSelection()">Run</button>
  </div>

</body>
</html>
